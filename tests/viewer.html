<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: Helvetica, sans-serif; background: #f5f5f5; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: #333; color: #fff; padding: 8px 16px;
      display: flex; align-items: center; gap: 12px; font-size: 13px;
    }
    #toolbar button {
      background: #555; color: #fff; border: none; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #toolbar button:hover { background: #777; }
    #info { opacity: 0.7; margin-left: auto; }
    #canvas {
      width: 100vw; height: calc(100vh - 36px); margin-top: 36px;
      overflow: hidden; cursor: grab;
    }
    #canvas svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>DOT Viewer</span>
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <span id="info">Click a cluster to collapse/expand</span>
  </div>
  <div id="canvas"></div>

  <script type="module">
    import { Graphviz } from "https://cdn.jsdelivr.net/npm/@hpcc-js/wasm@2.16.2/dist/graphviz.js";

    const canvas = document.getElementById('canvas');
    const info = document.getElementById('info');

    const dotSource = await fetch('example.txt').then(r => r.text());
    const graphviz = await Graphviz.load();
    const collapsedClusters = new Set();

    // ── Proper brace-matching parser for nested subgraphs ──

    function findSubgraphBlock(dot, clusterName) {
      const marker = `subgraph ${clusterName}`;
      const start = dot.indexOf(marker);
      if (start === -1) return null;

      let braceStart = dot.indexOf('{', start);
      if (braceStart === -1) return null;

      let depth = 1;
      let i = braceStart + 1;
      while (i < dot.length && depth > 0) {
        if (dot[i] === '{') depth++;
        if (dot[i] === '}') depth--;
        i++;
      }

      return {
        full: dot.substring(start, i),
        content: dot.substring(braceStart + 1, i - 1),
        start,
        end: i,
      };
    }

    function collectNodeIds(blockContent) {
      const ids = [];
      const re = /^\s*(\w+)\s*\[/gm;
      let m;
      while ((m = re.exec(blockContent)) !== null) {
        if (!['node', 'edge', 'graph', 'subgraph', 'rank'].includes(m[1])) {
          ids.push(m[1]);
        }
      }
      return ids;
    }

    /** Collect node IDs with their labels from DOT block content */
    function collectNodeInfo(blockContent) {
      const nodes = {};
      const re = /^\s*(\w+)\s*\[([^\]]*)\]/gm;
      let m;
      while ((m = re.exec(blockContent)) !== null) {
        const id = m[1];
        if (['node', 'edge', 'graph', 'subgraph', 'rank'].includes(id)) continue;
        const attrs = m[2];
        const lm = attrs.match(/label\s*=\s*"([^"]+)"/);
        nodes[id] = lm ? lm[1] : id;
      }
      return nodes;
    }

    function getClusterNames(dot) {
      const re = /subgraph\s+(cluster_\w+)/g;
      const names = [];
      let m;
      while ((m = re.exec(dot)) !== null) names.push(m[1]);
      return names;
    }

    function getLeafClusters(dot) {
      return getClusterNames(dot).filter(name => {
        const block = findSubgraphBlock(dot, name);
        return block && !/subgraph\s+cluster_/.test(block.content);
      });
    }

    /** Escape text for use inside a DOT record label */
    function escRecord(s) {
      return s.replace(/([|{}<>\\])/g, '\\$1');
    }

    // ── Build modified DOT with collapsed clusters ──

    function buildDot() {
      let dot = dotSource;

      for (const clusterName of collapsedClusters) {
        const block = findSubgraphBlock(dot, clusterName);
        if (!block) continue;

        const labelMatch = block.content.match(/label\s*=\s*"([^"]+)"/);
        const label = labelMatch ? labelMatch[1] : clusterName;

        // Get cluster fill color
        const fillMatch = block.content.match(/fillcolor\s*=\s*"([^"]+)"/);
        const clusterFill = fillMatch ? fillMatch[1] : '#ddd';

        // Collect node IDs and labels (including nested subgraphs)
        const nodeInfo = collectNodeInfo(block.content);
        const nestedRe = /subgraph\s+(cluster_\w+)/g;
        let nm;
        while ((nm = nestedRe.exec(block.content)) !== null) {
          const nested = findSubgraphBlock(dot, nm[1]);
          if (nested) Object.assign(nodeInfo, collectNodeInfo(nested.content));
        }

        // Separate into inputs, outputs, and core nodes
        const inputs = [];
        const outputs = [];
        const coreIds = [];
        for (const [id, nodeLabel] of Object.entries(nodeInfo)) {
          if (/_in_/.test(id))       inputs.push({ id, label: nodeLabel });
          else if (/_out_/.test(id)) outputs.push({ id, label: nodeLabel });
          else                       coreIds.push(id);
        }

        const placeholder = `${clusterName}_collapsed`;

        // Build record label: {inputs} | name [+] | {outputs}
        // With rankdir=LR: outer {} = left-to-right, nested {} = top-to-bottom
        const inCells  = inputs.map((p, i) => `<in_${i}>${escRecord(p.label)}`).join('|');
        const outCells = outputs.map((p, i) => `<out_${i}>${escRecord(p.label)}`).join('|');

        const parts = [];
        if (inCells)  parts.push(`{${inCells}}`);
        parts.push(`${escRecord(label)}\\n[+]`);
        if (outCells) parts.push(`{${outCells}}`);
        const recordLabel = `{${parts.join('|')}}`;

        const replacement = `${placeholder} [label="${recordLabel}", shape=record, style=filled, fillcolor="${clusterFill}", color=black, fontsize=8, fontname="Helvetica"];`;

        // Build port mapping: original node id -> "placeholder:port:compass"
        // Compass points ensure wires connect to the correct side of each port cell
        const portMap = {};
        inputs.forEach((p, i)  => { portMap[p.id] = `${placeholder}:in_${i}:w`; });
        outputs.forEach((p, i) => { portMap[p.id] = `${placeholder}:out_${i}:e`; });
        coreIds.forEach(id     => { portMap[id]    = placeholder; });

        const nodeIds = new Set(Object.keys(nodeInfo));

        dot = dot.replace(block.full, replacement);

        // Process edges: redirect internal nodes to record ports
        const lines = dot.split('\n');
        const seen = new Set();
        const result = [];

        for (const line of lines) {
          const trimmed = line.trim();

          if (!trimmed.includes('->')) {
            result.push(line);
            continue;
          }

          // Parse edge — supports node:port syntax from previous collapse iterations
          const em = trimmed.match(/^([\w:]+)\s*->\s*([\w:]+)\s*(.*?)$/);
          if (!em) {
            result.push(line);
            continue;
          }

          let source = em[1];
          let target = em[2];
          let rest = em[3].trim().replace(/;\s*$/, '').trim();

          const sourceBase = source.includes(':') ? source.split(':')[0] : source;
          const targetBase = target.includes(':') ? target.split(':')[0] : target;

          let srcReplaced = false;
          let tgtReplaced = false;

          if (nodeIds.has(sourceBase) || nodeIds.has(source)) {
            const key = nodeIds.has(source) ? source : sourceBase;
            source = portMap[key] || placeholder;
            srcReplaced = true;
          }

          if (nodeIds.has(targetBase) || nodeIds.has(target)) {
            const key = nodeIds.has(target) ? target : targetBase;
            target = portMap[key] || placeholder;
            tgtReplaced = true;
          }

          // Skip self-edges (both endpoints collapsed into same node)
          if (srcReplaced && tgtReplaced) continue;

          // Rebuild edge with existing attrs
          let attrParts = [];
          const attrMatch = rest.match(/^\[(.+)\]$/);
          if (attrMatch) attrParts.push(attrMatch[1].trim());

          let newLine;
          if (attrParts.length > 0) {
            newLine = `    ${source} -> ${target} [${attrParts.join(', ')}];`;
          } else {
            newLine = `    ${source} -> ${target};`;
          }

          if (seen.has(newLine.trim())) continue;
          seen.add(newLine.trim());
          result.push(newLine);
        }

        dot = result.join('\n');
      }

      return dot;
    }

    // ── Render ──

    function render() {
      const dot = buildDot();
      try {
        const svg = graphviz.dot(dot, 'svg');
        canvas.innerHTML = svg;
        attachHandlers();
        setupPanZoom();
      } catch (e) {
        info.textContent = 'Render error: ' + e.message;
        console.error(e, buildDot());
      }
    }

    function attachHandlers() {
      const svg = canvas.querySelector('svg');
      if (!svg) return;

      svg.querySelectorAll('g.cluster').forEach(g => {
        g.style.cursor = 'pointer';
        g.addEventListener('click', (e) => {
          e.stopPropagation();
          const title = g.querySelector('title')?.textContent;
          if (!title) return;
          if (collapsedClusters.has(title)) {
            collapsedClusters.delete(title);
          } else {
            collapsedClusters.add(title);
          }
          render();
        });
      });

      svg.querySelectorAll('g.node').forEach(g => {
        const title = g.querySelector('title')?.textContent || '';

        // Click collapsed placeholder to expand
        if (title.endsWith('_collapsed')) {
          g.style.cursor = 'pointer';
          g.addEventListener('click', (e) => {
            e.stopPropagation();
            const clusterName = title.replace('_collapsed', '');
            collapsedClusters.delete(clusterName);
            render();
          });
        }

        // Hover: highlight connected edges
        g.addEventListener('mouseenter', () => {
          const nodeId = g.querySelector('title')?.textContent;
          svg.querySelectorAll('g.edge').forEach(edge => {
            const t = edge.querySelector('title')?.textContent || '';
            if (t.includes(nodeId)) {
              edge.querySelector('path')?.setAttribute('stroke', '#e05');
              edge.querySelector('polygon')?.setAttribute('stroke', '#e05');
              edge.querySelector('polygon')?.setAttribute('fill', '#e05');
            }
          });
        });
        g.addEventListener('mouseleave', () => {
          svg.querySelectorAll('g.edge path').forEach(p => p.setAttribute('stroke', '#000000'));
          svg.querySelectorAll('g.edge polygon').forEach(p => {
            p.setAttribute('stroke', '#000000');
            p.setAttribute('fill', '#000000');
          });
        });
      });
    }

    // ── Pan & Zoom via viewBox ──

    function setupPanZoom() {
      const svg = canvas.querySelector('svg');
      if (!svg) return;

      const vb = svg.getAttribute('viewBox')?.split(/[\s,]+/).map(Number);
      if (!vb || vb.length < 4) return;
      let [vx, vy, vw, vh] = vb;

      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 1.1 : 0.9;
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / rect.width;
        const my = (e.clientY - rect.top) / rect.height;
        const newW = vw * factor;
        const newH = vh * factor;
        vx += (vw - newW) * mx;
        vy += (vh - newH) * my;
        vw = newW;
        vh = newH;
        svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
      });

      let dragging = false, sx, sy, svx, svy;

      canvas.addEventListener('pointerdown', (e) => {
        if (e.target.closest('g.cluster, g.node')) return;
        dragging = true;
        sx = e.clientX; sy = e.clientY;
        svx = vx; svy = vy;
        canvas.style.cursor = 'grabbing';
      });
      window.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const rect = svg.getBoundingClientRect();
        vx = svx - (e.clientX - sx) * (vw / rect.width);
        vy = svy - (e.clientY - sy) * (vh / rect.height);
        svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
      });
      window.addEventListener('pointerup', () => {
        dragging = false;
        canvas.style.cursor = 'grab';
      });
    }

    // ── Toolbar ──

    window.expandAll = () => { collapsedClusters.clear(); render(); };
    window.collapseAll = () => {
      getLeafClusters(dotSource)
        .filter(n => !n.startsWith('cluster_ext'))
        .forEach(n => collapsedClusters.add(n));
      render();
    };

    render();
  </script>
</body>
</html>
