<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Diagram Viewer</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: Helvetica, sans-serif; background: #f5f5f5; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: #333; color: #fff; padding: 8px 16px;
      display: flex; align-items: center; gap: 12px; font-size: 13px;
    }
    #toolbar button {
      background: #555; color: #fff; border: none; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #toolbar button:hover { background: #777; }
    #info { opacity: 0.85; margin-left: auto; }
    #canvas {
      width: 100vw; height: calc(100vh - 36px); margin-top: 36px;
      overflow: hidden; cursor: grab;
    }
    #canvas svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>Interactive DOT Viewer</span>
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <span id="info">Click clusters to collapse/expand</span>
  </div>
  <div id="canvas"></div>

  <script type="module">
    import { Graphviz } from "https://cdn.jsdelivr.net/npm/@hpcc-js/wasm@2.16.2/dist/graphviz.js";

    const canvas = document.getElementById("canvas");
    const info = document.getElementById("info");
    const params = new URLSearchParams(window.location.search);
    const taskId = params.get("task_id");

    if (!taskId) {
      info.textContent = "Missing task_id query param.";
      throw new Error("Missing task_id query param.");
    }

    const dotResp = await fetch(`http://localhost:8000/task/${encodeURIComponent(taskId)}/dot`);
    if (!dotResp.ok) {
      info.textContent = `Failed to load DOT for task ${taskId}`;
      throw new Error(`DOT fetch failed: ${dotResp.status}`);
    }
    const dotPayload = await dotResp.json();
    const dotSource = dotPayload.dot_source || "";
    if (!dotSource) {
      info.textContent = "Task has no DOT source.";
      throw new Error("Task has no DOT source.");
    }

    const graphviz = await Graphviz.load();
    const collapsedClusters = new Set();

    function findSubgraphBlock(dot, clusterName) {
      const marker = `subgraph ${clusterName}`;
      const start = dot.indexOf(marker);
      if (start === -1) return null;

      const braceStart = dot.indexOf("{", start);
      if (braceStart === -1) return null;

      let depth = 1;
      let i = braceStart + 1;
      while (i < dot.length && depth > 0) {
        if (dot[i] === "{") depth++;
        if (dot[i] === "}") depth--;
        i++;
      }

      return {
        full: dot.substring(start, i),
        content: dot.substring(braceStart + 1, i - 1),
      };
    }

    function collectNodeInfo(blockContent) {
      const nodes = {};
      const re = /^\s*(\w+)\s*\[([^\]]*)\]/gm;
      let m;
      while ((m = re.exec(blockContent)) !== null) {
        const id = m[1];
        if (["node", "edge", "graph", "subgraph", "rank"].includes(id)) continue;
        const attrs = m[2];
        const lm = attrs.match(/label\s*=\s*"([^"]+)"/);
        nodes[id] = lm ? lm[1] : id;
      }
      return nodes;
    }

    function getClusterNames(dot) {
      const re = /subgraph\s+(cluster_\w+)/g;
      const names = [];
      let m;
      while ((m = re.exec(dot)) !== null) names.push(m[1]);
      return names;
    }

    function getLeafClusters(dot) {
      return getClusterNames(dot).filter((name) => {
        const block = findSubgraphBlock(dot, name);
        return block && !/subgraph\s+cluster_/.test(block.content);
      });
    }

    function escRecord(s) {
      return s.replace(/([|{}<>\\])/g, "\\$1");
    }

    function buildDot() {
      let dot = dotSource;

      for (const clusterName of collapsedClusters) {
        const block = findSubgraphBlock(dot, clusterName);
        if (!block) continue;

        const labelMatch = block.content.match(/label\s*=\s*"([^"]+)"/);
        const label = labelMatch ? labelMatch[1] : clusterName;
        const fillMatch = block.content.match(/fillcolor\s*=\s*"([^"]+)"/);
        const clusterFill = fillMatch ? fillMatch[1] : "#ddd";

        const nodeInfo = collectNodeInfo(block.content);
        const nestedRe = /subgraph\s+(cluster_\w+)/g;
        let nm;
        while ((nm = nestedRe.exec(block.content)) !== null) {
          const nested = findSubgraphBlock(dot, nm[1]);
          if (nested) Object.assign(nodeInfo, collectNodeInfo(nested.content));
        }

        const placeholder = `${clusterName}_collapsed`;

        // Plain box — all edges from any port route to the single proxy box
        // Use raw label (preserving \n DOT newline); escRecord is for record syntax only
        const safeLabel = label.replace(/"/g, '\\"');
        const replacement = `${placeholder} [label="${safeLabel}\\n[+]", shape=box, style=filled, fillcolor="${clusterFill}", color=black, fontsize=10, fontname="Helvetica"];`;

        const portMap = {};
        Object.keys(nodeInfo).forEach((id) => { portMap[id] = placeholder; });

        const nodeIds = new Set(Object.keys(nodeInfo));
        dot = dot.replace(block.full, replacement);

        const lines = dot.split("\n");
        // edgeMap consolidates parallel edges between the same (src, target, dir) pair
        const edgeMap = new Map();
        const result = [];

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.includes("->")) {
            result.push(line);
            continue;
          }

          const em = trimmed.match(/^([\w:]+)\s*->\s*([\w:]+)\s*(.*?)$/);
          if (!em) {
            result.push(line);
            continue;
          }

          let source = em[1];
          let target = em[2];
          const rest = em[3].trim().replace(/;\s*$/, "").trim();

          const sourceBase = source.includes(":") ? source.split(":")[0] : source;
          const targetBase = target.includes(":") ? target.split(":")[0] : target;

          let srcReplaced = false;
          let tgtReplaced = false;

          if (nodeIds.has(sourceBase) || nodeIds.has(source)) {
            const key = nodeIds.has(source) ? source : sourceBase;
            source = portMap[key] || placeholder;
            srcReplaced = true;
          }
          if (nodeIds.has(targetBase) || nodeIds.has(target)) {
            const key = nodeIds.has(target) ? target : targetBase;
            target = portMap[key] || placeholder;
            tgtReplaced = true;
          }

          // Skip internal edges (both endpoints inside the same collapsed cluster)
          if (srcReplaced && tgtReplaced && source === target) continue;

          // Pass through fully-expanded edges unchanged
          if (!srcReplaced && !tgtReplaced) {
            result.push(line);
            continue;
          }

          // Consolidate by (source, target, dir) — keep forward/backward edges separate
          const dirMatch = rest.match(/\bdir\s*=\s*(\w+)/);
          const dir = dirMatch ? dirMatch[1] : "";
          const pairKey = `${source}|${target}|${dir}`;

          const xlabelMatch = rest.match(/xlabel\s*=\s*"([^"]+)"/);
          const wireName = xlabelMatch ? xlabelMatch[1] : null;

          if (!edgeMap.has(pairKey)) {
            edgeMap.set(pairKey, { source, target, rest, wires: wireName ? [wireName] : [] });
          } else if (wireName) {
            edgeMap.get(pairKey).wires.push(wireName);
          }
        }

        // Build consolidated edge lines — strip xlabel (floats randomly with splines=ortho)
        const edgeLines = [];
        for (const [, { source, target, rest }] of edgeMap) {
          const cleanRest = rest
            .replace(/,?\s*xlabel\s*=\s*"[^"]*"/, "")
            .replace(/\[\s*,\s*/, "[")
            .trim();
          edgeLines.push(cleanRest ? `    ${source} -> ${target} ${cleanRest};` : `    ${source} -> ${target};`);
        }

        // Splice edges before the last "}" so they land inside the digraph block
        let insertIdx = result.length;
        for (let i = result.length - 1; i >= 0; i--) {
          if (result[i].trim() === "}") { insertIdx = i; break; }
        }
        result.splice(insertIdx, 0, ...edgeLines);

        dot = result.join("\n");
      }

      // Post-collapse: strip bus relay tap nodes and re-emit direct signal→box edges.
      // Only runs in full overview mode to avoid breaking partially-expanded views.
      const allLeafNonExt = getLeafClusters(dotSource).filter((n) => n !== "cluster_ext_in" && n !== "cluster_ext_out");
      if (allLeafNonExt.length > 0 && allLeafNonExt.every((n) => collapsedClusters.has(n))) {
        const tapNodes = new Set();
        const tapRe = /^\s*(\w*_tap_\w+)\s*\[/gm;
        let tapM;
        while ((tapM = tapRe.exec(dot)) !== null) tapNodes.add(tapM[1]);

        if (tapNodes.size > 0) {
          const tapUpstream = new Map(); // tap → its upstream node (signal or prior tap)
          const tapToBox = [];           // {tap, box, color} for tap→collapsed edges

          for (const line of dot.split("\n")) {
            const t = line.trim();
            const em = t.match(/^(\w+)\s*->\s*(\w+)\s*(\[.*\])?/);
            if (!em) continue;
            const [, src, tgt, attrs = ""] = em;
            if (tapNodes.has(tgt)) tapUpstream.set(tgt, src);
            if (tapNodes.has(src) && !tapNodes.has(tgt)) {
              const colorM = attrs.match(/color\s*=\s*"([^"]+)"/);
              tapToBox.push({ tap: src, box: tgt, color: colorM ? colorM[1] : "#666666" });
            }
          }

          // Trace each tap back to its original signal source (before any tap chain)
          const seenPairs = new Set();
          const directEdges = [];
          for (const { tap, box, color } of tapToBox) {
            let signal = tap;
            while (tapNodes.has(signal)) {
              const up = tapUpstream.get(signal);
              if (up === undefined) break;
              signal = up;
            }
            const pair = `${signal}|${box}`;
            if (!seenPairs.has(pair)) {
              seenPairs.add(pair);
              directEdges.push(`    ${signal} -> ${box} [color="${color}"];`);
            }
          }

          // Remove tap node declarations and all edges touching a tap node
          const cleanLines = dot.split("\n").filter((line) => {
            const t = line.trim();
            const nodeM = t.match(/^(\w+)\s*\[/);
            if (nodeM && tapNodes.has(nodeM[1])) return false;
            const edgeM = t.match(/^(\w+)\s*->\s*(\w+)/);
            if (edgeM && (tapNodes.has(edgeM[1]) || tapNodes.has(edgeM[2]))) return false;
            return true;
          });

          // Splice direct edges inside the digraph block
          let insertAt = cleanLines.length;
          for (let i = cleanLines.length - 1; i >= 0; i--) {
            if (cleanLines[i].trim() === "}") { insertAt = i; break; }
          }
          cleanLines.splice(insertAt, 0, ...directEdges);
          dot = cleanLines.join("\n");
        }
      }

      return dot;
    }

    function attachHandlers() {
      const svg = canvas.querySelector("svg");
      if (!svg) return;

      svg.querySelectorAll("g.cluster").forEach((g) => {
        g.style.cursor = "pointer";
        g.addEventListener("click", (e) => {
          e.stopPropagation();
          const title = g.querySelector("title")?.textContent;
          if (!title) return;
          if (collapsedClusters.has(title)) collapsedClusters.delete(title);
          else collapsedClusters.add(title);
          render();
        });
      });

      svg.querySelectorAll("g.node").forEach((g) => {
        const title = g.querySelector("title")?.textContent || "";
        if (title.endsWith("_collapsed")) {
          g.style.cursor = "pointer";
          g.addEventListener("click", (e) => {
            e.stopPropagation();
            const clusterName = title.replace("_collapsed", "");
            collapsedClusters.delete(clusterName);
            render();
          });
        }
      });
    }

    function setupPanZoom() {
      const svg = canvas.querySelector("svg");
      if (!svg) return;
      const vb = svg.getAttribute("viewBox")?.split(/[\s,]+/).map(Number);
      if (!vb || vb.length < 4) return;

      let [vx, vy, vw, vh] = vb;
      canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 1.1 : 0.9;
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / rect.width;
        const my = (e.clientY - rect.top) / rect.height;
        const newW = vw * factor;
        const newH = vh * factor;
        vx += (vw - newW) * mx;
        vy += (vh - newH) * my;
        vw = newW;
        vh = newH;
        svg.setAttribute("viewBox", `${vx} ${vy} ${vw} ${vh}`);
      });

      let dragging = false;
      let sx = 0;
      let sy = 0;
      let svx = 0;
      let svy = 0;

      canvas.addEventListener("pointerdown", (e) => {
        if (e.target.closest("g.cluster, g.node")) return;
        dragging = true;
        sx = e.clientX;
        sy = e.clientY;
        svx = vx;
        svy = vy;
        canvas.style.cursor = "grabbing";
      });
      window.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const rect = svg.getBoundingClientRect();
        vx = svx - (e.clientX - sx) * (vw / rect.width);
        vy = svy - (e.clientY - sy) * (vh / rect.height);
        svg.setAttribute("viewBox", `${vx} ${vy} ${vw} ${vh}`);
      });
      window.addEventListener("pointerup", () => {
        dragging = false;
        canvas.style.cursor = "grab";
      });
    }

    function render() {
      const dot = buildDot();
      try {
        const svg = graphviz.dot(dot, "svg");
        canvas.innerHTML = svg;
        attachHandlers();
        setupPanZoom();
        info.textContent = `Task ${taskId} loaded`;
      } catch (e) {
        info.textContent = "Render error. Check console.";
        console.error(e);
      }
    }

    window.expandAll = () => { collapsedClusters.clear(); render(); };
    window.collapseAll = () => {
      getLeafClusters(dotSource)
        .filter((n) => n !== "cluster_ext_in" && n !== "cluster_ext_out")
        .forEach((n) => collapsedClusters.add(n));
      render();
    };

    collapseAll();
  </script>
</body>
</html>
